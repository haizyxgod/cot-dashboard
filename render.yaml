services:
  - type: web
    name: cot-dashboard
    runtime: python
    buildCommand: pip install -r cot_dashboard/requirements.txt
    startCommand: cd cot_dashboard && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
    plan: free
